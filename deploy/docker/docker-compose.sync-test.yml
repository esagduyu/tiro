# Sync S4 adapter-conformance backends. TEST-ONLY — not part of the product
# deployment (that is docker-compose.yml beside this file).
#
#   docker compose -f deploy/docker/docker-compose.sync-test.yml up -d
#
# tests/test_sync_adapter_s3.py probes MinIO at localhost:9000 and
# tests/test_sync_adapter_webdav.py probes Nextcloud at localhost:8081;
# both AUTO-SKIP when unreachable (the filesystem conformance run is the
# always-on gate). Nextcloud auto-installs on first boot (~30-60s before
# status.php reports installed).
#
# Image tags: MinIO must be a release with S3 conditional writes
# (If-None-Match on PUT; any release from late 2024 onward). If a pinned tag
# below no longer exists at pull time, substitute the newest available tag
# for that image — nothing here depends on an exact version.
services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: tiro-sync-test
      MINIO_ROOT_PASSWORD: tiro-sync-test-secret

  nextcloud:
    image: nextcloud:31-apache
    ports:
      - "8081:80"
    environment:
      NEXTCLOUD_ADMIN_USER: tiro
      NEXTCLOUD_ADMIN_PASSWORD: tiro-sync-test-pass
      SQLITE_DATABASE: nextcloud
      NEXTCLOUD_TRUSTED_DOMAINS: localhost

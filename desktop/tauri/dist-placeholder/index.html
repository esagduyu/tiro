<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tiro</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0; height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #FAF6F0; color: #3a332c;
      }
      @media (prefers-color-scheme: dark) {
        html, body { background: #1C1A17; color: #e7e0d6; }
      }
      .wrap {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.25rem; padding: 2rem;
        text-align: center;
      }
      .mark {
        width: 84px; height: 84px; border-radius: 18px;
        background: #C45B3E; color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-size: 52px; line-height: 1; box-shadow: 0 6px 20px rgba(0,0,0,.18);
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
      p { margin: 0; opacity: .7; font-size: .95rem; max-width: 34rem; }
      .spinner {
        width: 26px; height: 26px; border-radius: 50%;
        border: 3px solid rgba(196,91,62,.25); border-top-color: #C45B3E;
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #error { display: none; color: #B5334D; font-weight: 500; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .85em; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">⁊</div>
      <h1>Starting Tiro…</h1>
      <div class="spinner" id="spinner"></div>
      <p id="status">Waking the reading engine. First launch can take a moment while the library initializes.</p>
      <p id="error"></p>
    </div>
    <script>
      // The Rust shell calls window.__tiroError(msg) if the server never comes up.
      window.__tiroError = function (msg) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("status").style.display = "none";
        var e = document.getElementById("error");
        e.style.display = "block";
        e.innerHTML = msg;
      };
    </script>
  </body>
</html>

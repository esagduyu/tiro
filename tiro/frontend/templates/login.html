<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tiro ⁊ Sign in</title>
  <!-- PWA tags mirrored from base.html (login.html is standalone): the login page
       is the first-run surface a phone lands on, so installability starts here. -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#C45B3E">
  <link rel="apple-touch-icon" href="/static/icons/tiro-192.png" sizes="192x192">
  <link id="theme-css" rel="stylesheet" href="{{ theme_light_href }}"
        data-light-href="{{ theme_light_href }}" data-dark-href="{{ theme_dark_href }}">
  <script>
    (function () {
      var mode = localStorage.getItem('tiro-mode');
      if (!mode) mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      var link = document.getElementById('theme-css');
      if (mode === 'dark') link.href = link.getAttribute('data-dark-href');
      document.documentElement.setAttribute('data-theme', mode);
    })();
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 1.5rem;
      background: var(--tiro-bg, #FAF6F0);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--tiro-fg, #2C2520);
    }
    .login-card {
      width: min(90vw, 380px); padding: 2.5rem 2rem 2.25rem;
      background: var(--tiro-bg-surface, #F5EDE3);
      border: 1px solid var(--tiro-border, #DDD5CA);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      text-align: center;
    }
    .login-mark {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 3rem; line-height: 1;
      color: var(--tiro-accent, #C45B3E);
      margin-bottom: 0.5rem;
    }
    .login-card h1 {
      margin: 0 0 0.35rem; font-size: 1.75rem; font-weight: 700;
      letter-spacing: -0.02em;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--tiro-fg, #2C2520);
    }
    .login-card p.sub {
      margin: 0 0 1.75rem; font-size: 0.9rem; line-height: 1.5;
      color: var(--tiro-fg-secondary, #5C534A);
    }
    .login-card form { text-align: left; }
    .onb-field-label {
      display: block; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--tiro-muted, #9C9389);
      margin-bottom: 0.35rem;
    }
    .login-card input {
      width: 100%; padding: 0.6rem 0.75rem;
      margin-bottom: 1rem; border: 1px solid var(--tiro-border, #DDD5CA);
      border-radius: 6px; font-size: 0.9rem; font-family: inherit;
      background: var(--tiro-bg, #FAF6F0);
      color: var(--tiro-fg, #2C2520);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-card input:focus {
      border-color: var(--tiro-accent, #C45B3E);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--tiro-accent, #C45B3E) 15%, transparent);
    }
    .login-card input::placeholder {
      color: var(--tiro-muted, #9C9389);
    }
    /* .btn-block .btn-primary equivalent (login is standalone, no styles.css) */
    .login-card button {
      display: flex; width: 100%; justify-content: center;
      padding: 0.75rem 1.5rem; border: 1px solid var(--tiro-accent, #C45B3E);
      border-radius: 10px;
      background: var(--tiro-accent, #C45B3E); color: #fff;
      font-size: 0.9rem; font-weight: 600; font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .login-card button:hover {
      background: var(--tiro-accent-hover, #A84A30);
      border-color: var(--tiro-accent-hover, #A84A30);
    }
    .login-card button:focus-visible {
      outline: 2px solid var(--tiro-accent, #C45B3E);
      outline-offset: 2px;
    }
    /* Error rendered as a crimson callout; hidden while empty (JS clears via textContent="") */
    .error {
      background: var(--tiro-bg, #FAF6F0);
      border-left: 3px solid var(--tiro-tier-must-read, #B5334D);
      border-radius: 0 6px 6px 0;
      color: var(--tiro-tier-must-read, #B5334D);
      font-size: 0.85rem; line-height: 1.4;
      padding: 0.6rem 0.8rem; margin: 0 0 1rem;
    }
    .error:empty { display: none; }
    .hidden { display: none; }
    .login-footer {
      margin-top: 1.5rem; text-align: center;
      font-size: 0.75rem; font-style: italic;
      color: var(--tiro-muted, #9C9389);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-mark" aria-hidden="true">⁊</div>
    <h1>Tiro</h1>
    <p class="sub" id="subtitle">Sign in to your library</p>
    <p class="error" id="error"></p>
    <form id="auth-form">
      <label class="onb-field-label" for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autofocus autocomplete="current-password">
      <button type="submit" id="submit">Sign in</button>
    </form>
  </div>
  <p class="login-footer">&ldquo;...without you the oracle was dumb.&rdquo; &mdash; Cicero to Tiro, 53 BC</p>
  <script>
    // login.html is the sign-in surface for CONFIGURED installs only. First-run
    // setup (setting the initial password) moved into the /welcome onboarding
    // wizard (Phase 5 D6): if the server has no password yet, redirect there
    // instead of flipping this page into an inline setup form.
    const $ = (id) => document.getElementById(id);

    fetch("/api/auth/status").then(r => r.json()).then(({ data }) => {
      if (!data.configured) {
        window.location.href = "/welcome";
      } else if (data.authenticated) {
        window.location.href = "/inbox";
      }
    });

    $("auth-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      $("error").textContent = "";
      const password = $("password").value;
      const r = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      if (r.ok) {
        window.location.href = "/inbox";
      } else {
        const body = await r.json().catch(() => ({}));
        $("error").textContent = body.detail || "Something went wrong";
      }
    });
  </script>
  <!-- Service worker registration (M3.1 Task 2): login.html is standalone
       and doesn't load sidebar.js (see the PWA-tags comment above), but a
       phone can land here with no session yet -- installability and
       offline support should start from the very first page, so this
       imports the exact same sw-register.js module sidebar.js uses on
       every other page rather than duplicating the registration logic. -->
  <script type="module">
    import { registerServiceWorker } from "/static/js/sw-register.js?v={{ static_v }}";
    registerServiceWorker();
  </script>
</body>
</html>

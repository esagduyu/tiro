# Tiro Configuration
library_path: "./tiro-library"

# API Keys (required for Opus & Haiku AI features)
# Option 1: Set the key here (tiro init will do this for you)
# anthropic_api_key: "sk-ant-..."
# Option 2: Set the ANTHROPIC_API_KEY environment variable (e.g. via direnv)
# Option 3: Skip — Tiro works without it, but digests, analysis, and
#            classification will be unavailable

# Server
host: "127.0.0.1"   # Use "0.0.0.0" for LAN access, or run with: tiro run --lan
port: 8000

# mDNS/Bonjour discovery (opt-in) — advertise Tiro on your LAN as
# {hostname}.local so phones on the same Wi-Fi find it by name instead of
# typing a LAN IP. Only takes effect when bound to a non-loopback host.
# mdns_enabled: false
# mdns_hostname: "tiro"

# Remote access — your Tailscale/remote URL, set by the /setup/remote wizard
# (Phase 3 M3.1) or manually. Informational only today (shown by `tiro status`).
# remote_url: "https://100.x.x.x:8000"

# Authentication
# Set your password with `tiro set-password` or via the first-run /login
# screen — both store a bcrypt hash here. Do NOT hand-edit this value.
# LAN mode (--lan or host 0.0.0.0) refuses to start until a password is set.
# auth_password_hash: "$2b$12$..."

# Ingestion defaults
default_embedding_model: "all-MiniLM-L6-v2"

# Vector indexing retry — if ChromaDB is unavailable during ingestion, the
# article is still saved (vector_status = pending) and re-indexed by a
# background loop on this interval.
# vector_retry_interval: 5   # minutes (0 = disable the background retry)

# Intelligence
opus_model: "claude-opus-4-6"
haiku_model: "claude-haiku-4-5-20251001"

# AI backend routing (optional). Tiers map to providers+models; defaults use
# Anthropic with opus_model/haiku_model above.
# Providers: anthropic | openai-compatible | claude-cli | codex-cli
# When changing a provider, set the matching ai_*_model too — the defaults are Anthropic model names.
# ai_heavy_provider: "anthropic"
# ai_light_provider: "anthropic"
# ai_heavy_model: null            # defaults to opus_model
# ai_light_model: null            # defaults to haiku_model
# openai-compatible: works with OpenAI, Ollama, LM Studio, Gemini-compat:
# ai_openai_base_url: "http://localhost:11434/v1"   # Ollama example
# ai_openai_api_key: "sk-..."                        # not needed for Ollama

# EXPERIMENTAL — agent-CLI backends (local-only): route AI tiers through your
# own locally-installed, locally-authenticated Claude Code or Codex CLI, using
# the subscription you already pay for. Opt-in, never a default. Heads-up:
# Anthropic's Claude Code terms direct third-party products to API keys; you
# are choosing to run your own CLI on your own machine. Slow for batch work —
# recommended for the heavy tier only (digests/analysis).
# set ai_heavy_provider above to "claude-cli" to enable
# ai_claude_cli_path: "claude"
# ai_codex_cli_path: "codex"

# Content decay
decay_rate_default: 0.95
decay_rate_disliked: 0.90
decay_rate_vip: 0.98
decay_threshold: 0.1

# Auto-backup retention — snapshots written to {library}/backups/auto/ before
# destructive operations (reclassify-with-clear, source delete). 0 disables.
# backup_auto_keep: 10

# Digest email (optional)
# digest_email: "you@example.com"

# Digest scheduling — auto-generate and email digests daily
# digest_schedule_enabled: false
# digest_schedule_time: "07:00"   # HH:MM in your local time
# digest_unread_only: false       # Only include unread articles in digest
# digest_timezone_offset: 0       # Auto-set from browser (JS getTimezoneOffset)

# SMTP — for sending digest emails
# For Gmail: smtp.gmail.com:587 with an App Password
# For local testing: localhost:1025 with mailhog
# smtp_host: "smtp.gmail.com"
# smtp_port: 587
# smtp_user: "you@gmail.com"
# smtp_password: "your-gmail-app-password"
# smtp_use_tls: true

# IMAP — for receiving newsletters
# Create a Gmail label (e.g. "tiro"), filter newsletters to it,
# and Tiro will auto-ingest them.
# imap_host: "imap.gmail.com"
# imap_port: 993
# imap_user: "you@gmail.com"
# imap_password: "your-gmail-app-password"
# imap_label: "tiro"
# imap_enabled: true
# imap_sync_interval: 15   # minutes (0 = manual only, default 15 when configured)

# Text-to-Speech (optional)
# Tiro can read articles aloud using OpenAI's TTS API.
# Get your key at https://platform.openai.com/api-keys
# openai_api_key: "sk-..."
# tts_voice: "nova"     # Options: alloy, echo, fable, onyx, nova, shimmer
# tts_model: "tts-1"    # Options: tts-1 (fast), tts-1-hd (higher quality, 2x cost)

# Inbox
# inbox_page_size: 50   # Articles per page (25, 50, or 100)

# Appearance
# theme_light: "papyrus"      # Light theme CSS file name
# theme_dark: "roman-night"   # Dark theme CSS file name

# Reading telemetry — opt-in, strictly local-only — feeds future
# wiki-importance ranking (Decision #8); never leaves your machine
# reading_telemetry_enabled: false

# Obsidian-compatible write mode — format-only (bidirectional sync is a
# later phase). When true, NEW articles' frontmatter gains Obsidian-standard
# fields: aliases: [], created: <date>, and related: ["[[stem]]", ...]
# wikilinks to related articles instead of /articles/{id} URLs. Existing
# articles are untouched; tags are already a plain YAML list either way.
# obsidian_compatible_mode: false
